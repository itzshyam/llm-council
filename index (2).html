<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Council</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,-apple-system,sans-serif;background:#f8f8f6;color:#1a1a1a;min-height:100vh}
  .container{max-width:880px;margin:0 auto;padding:2.5rem 1.5rem}
  h1{font-size:22px;font-weight:500;margin-bottom:4px}
  .subtitle{font-size:14px;color:#888;margin-bottom:2.5rem}

  .api-bar{background:#fff;border:0.5px solid #e0e0dc;border-radius:10px;padding:1rem 1.25rem;margin-bottom:2rem;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .api-bar label{font-size:13px;color:#666;white-space:nowrap}
  .api-bar input{flex:1;min-width:200px;padding:8px 10px;border:0.5px solid #ddd;border-radius:6px;font-size:13px;font-family:monospace;background:#fafafa}
  .api-bar input:focus{outline:none;border-color:#aaa}
  .api-status{font-size:12px;padding:4px 10px;border-radius:20px;white-space:nowrap}
  .api-status.ok{background:#e8f5ee;color:#2a7a4a}
  .api-status.empty{background:#f5f5f0;color:#999}

  textarea{width:100%;min-height:110px;padding:12px 14px;border:0.5px solid #ddd;border-radius:10px;font-size:15px;font-family:inherit;resize:vertical;background:#fff;line-height:1.6}
  textarea:focus{outline:none;border-color:#aaa}

  .actions{display:flex;align-items:center;gap:14px;margin-top:10px;flex-wrap:wrap}
  .btn{padding:10px 24px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;transition:background .15s}
  .btn:hover{background:#333}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn-ghost{padding:10px 16px;background:transparent;color:#666;border:0.5px solid #ddd;border-radius:8px;font-size:13px;cursor:pointer}
  .btn-ghost:hover{background:#f5f5f0}
  .cost-note{font-size:12px;color:#bbb}

  .progress-wrap{margin:1.5rem 0}
  .progress-label{font-size:13px;color:#555;margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .bar{height:4px;background:#e8e8e4;border-radius:2px;overflow:hidden}
  .bar-fill{height:100%;background:#1a1a1a;border-radius:2px;transition:width .5s ease}
  .phases{display:flex;flex-direction:column;gap:5px;margin-top:10px}
  .ph{display:flex;align-items:center;gap:8px;font-size:13px;color:#bbb}
  .ph.active{color:#1a1a1a;font-weight:500}
  .ph.done{color:#2a7a4a}
  .dot{width:7px;height:7px;border-radius:50%;background:#e0e0dc;flex-shrink:0}
  .ph.active .dot{background:#1a1a1a}
  .ph.done .dot{background:#2a7a4a}

  .section{margin-top:2.5rem}
  .sec-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:#aaa;margin-bottom:1rem}

  .framing-card{background:#fdf8f0;border:0.5px solid #e8d8b0;border-radius:10px;padding:1rem 1.25rem;font-size:14px;line-height:1.75;color:#333}
  .framing-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:#b08030;margin-bottom:6px}

  .advisor-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:600px){.advisor-grid{grid-template-columns:1fr}}
  .a-card{background:#fff;border:0.5px solid #e8e8e4;border-radius:10px;padding:1rem 1.25rem;transition:opacity .3s}
  .a-card.loading{opacity:.45}
  .a-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .a-icon{font-size:15px}
  .a-name{font-size:13px;font-weight:500}
  .a-body{font-size:14px;line-height:1.7;color:#333}

  .review-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:600px){.review-grid{grid-template-columns:1fr}}
  .r-card{background:#faf9f7;border:0.5px solid #e8e8e4;border-radius:8px;padding:1rem;font-size:13px;line-height:1.65;color:#444}
  .r-from{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:#bbb;margin-bottom:6px}
  .full{grid-column:1/-1}

  .verdict-card{background:#fff;border:0.5px solid #e8e8e4;border-radius:12px;padding:1.5rem}
  .v-sec{margin-bottom:1.25rem}
  .v-sec:last-child{margin-bottom:0}
  .v-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:#aaa;margin-bottom:6px}
  .v-body{font-size:15px;line-height:1.75;color:#1a1a1a}
  .v-hr{border:none;border-top:0.5px solid #ececea;margin:1.25rem 0}
  .one-thing{background:#f0f7f3;border:0.5px solid #b8ddc8;border-radius:10px;padding:1rem 1.25rem;margin-top:12px}
  .one-thing .v-label{color:#2a7a4a}
  .one-thing .v-body{font-weight:500;font-size:16px}

  .error-box{background:#fff5f5;border:0.5px solid #f0c0c0;border-radius:8px;padding:1rem;color:#c03030;font-size:14px;margin-top:1rem}
  .spinner{display:inline-block;width:13px;height:13px;border:2px solid #ccc;border-top-color:#555;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}

  .anon-note{font-size:12px;color:#bbb;margin-bottom:10px}
  .export-btn{margin-top:1.5rem;text-align:center}
</style>
</head>
<body>
<div class="container">
  <h1>LLM Council</h1>
  <p class="subtitle">5 independent advisors · peer review · chairman verdict</p>

  <div class="api-bar">
    <label>Anthropic API key</label>
    <input type="password" id="apiKey" placeholder="sk-ant-..." oninput="saveKey()" />
    <span class="api-status" id="apiStatus">Not set</span>
  </div>

  <textarea id="question" placeholder="Describe your decision or question. Include context — your constraints, goals, what's at stake. The council gives much better advice with specifics."></textarea>
  <div class="actions">
    <button class="btn" id="runBtn" onclick="runCouncil()">Convene the Council</button>
    <button class="btn-ghost" onclick="clearAll()">Clear</button>
    <span class="cost-note">~$0.10 per session · claude-sonnet-4</span>
  </div>

  <div id="progressArea" style="display:none">
    <div class="progress-wrap">
      <div class="progress-label"><span class="spinner" id="spin"></span><span id="progLabel">Starting...</span></div>
      <div class="bar"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
      <div class="phases" id="phases"></div>
    </div>
  </div>

  <div id="errorArea"></div>
  <div id="outputArea"></div>
</div>

<script>
const ADVISORS=[
  {id:'contrarian',name:'The Contrarian',icon:'🔴',style:'Actively look for what is wrong, missing, or will fail. Assume a fatal flaw exists and find it. Be specific. Do not hedge.'},
  {id:'firstprinciples',name:'First Principles Thinker',icon:'🔵',style:'Ignore the surface question. Ask what the person is actually trying to solve. Strip assumptions. Rebuild from scratch. If they are asking the wrong question, say so directly.'},
  {id:'expansionist',name:'The Expansionist',icon:'🟢',style:'Look for upside being missed. What could be bigger? What adjacent opportunity is hiding? Ignore risk entirely — focus only on what is being undervalued.'},
  {id:'outsider',name:'The Outsider',icon:'⚪',style:'You have zero context about this person or field. Respond only to what is written. Catch the curse of knowledge: what is obvious to them but confusing to everyone else?'},
  {id:'executor',name:'The Executor',icon:'🟡',style:'Only care about execution: can this be done, and what is the fastest path? Ask "what do you do Monday morning?" If there is no clear first step, say so.'}
];
const PHASES=[
  {id:'frame',label:'Framing the question'},
  {id:'advisors',label:'Convening 5 advisors (parallel)'},
  {id:'review',label:'Peer review (5 reviewers, parallel)'},
  {id:'chairman',label:'Chairman synthesis'},
];

// API key persistence
window.addEventListener('load',()=>{
  const k=localStorage.getItem('council_api_key');
  if(k){document.getElementById('apiKey').value=k;updateKeyStatus(k);}
});
function saveKey(){
  const k=document.getElementById('apiKey').value.trim();
  if(k)localStorage.setItem('council_api_key',k);
  updateKeyStatus(k);
}
function updateKeyStatus(k){
  const el=document.getElementById('apiStatus');
  if(k&&k.startsWith('sk-')){el.textContent='Key saved';el.className='api-status ok';}
  else{el.textContent='Not set';el.className='api-status empty';}
}

function getKey(){return document.getElementById('apiKey').value.trim();}

function setProgress(pct,label){
  document.getElementById('barFill').style.width=pct+'%';
  document.getElementById('progLabel').textContent=label;
}
function setPhase(activeId){
  const ids=PHASES.map(p=>p.id);
  const ai=ids.indexOf(activeId);
  document.getElementById('phases').innerHTML=PHASES.map((p,i)=>{
    const cls=i<ai?'done':i===ai?'active':'';
    return `<div class="ph ${cls}"><div class="dot"></div>${p.label}</div>`;
  }).join('');
}

async function callClaude(system,user){
  const key=getKey();
  if(!key)throw new Error('No API key set. Enter your Anthropic API key above.');
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system,messages:[{role:'user',content:user}]})
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return d.content.map(b=>b.text||'').join('');
}

let results={};

async function runCouncil(){
  const question=document.getElementById('question').value.trim();
  if(!question)return;
  const key=getKey();
  if(!key||!key.startsWith('sk-')){
    document.getElementById('errorArea').innerHTML=`<div class="error-box">Please enter your Anthropic API key above first.</div>`;
    return;
  }
  document.getElementById('runBtn').disabled=true;
  document.getElementById('progressArea').style.display='block';
  document.getElementById('outputArea').innerHTML='';
  document.getElementById('errorArea').innerHTML='';
  results={};

  try{
    // Frame
    setPhase('frame');setProgress(5,'Framing the question...');
    const framed=await callClaude(
      'Reframe the user question for an LLM Council. Include: (1) core decision, (2) key context, (3) what is at stake. 3-5 sentences, neutral, no opinion. Output only the framed question.',
      question
    );
    results.framed=framed;
    renderFraming(framed);

    // Advisors parallel
    setPhase('advisors');setProgress(15,'Convening 5 advisors in parallel...');
    renderAdvisorSkeleton();
    const aRes=await Promise.all(ADVISORS.map(a=>
      callClaude(
        `You are ${a.name} on an LLM Council.\nThinking style: ${a.style}\nRespond from your perspective only. Be direct. Do not hedge. 150-250 words. No preamble — start your analysis immediately.`,
        `Council question:\n\n${framed}`
      ).then(t=>({id:a.id,t}))
    ));
    results.advisors={};
    aRes.forEach(r=>{results.advisors[r.id]=r.t;});
    setProgress(50,'Advisors done. Running peer review...');
    renderAdvisors(results.advisors);

    // Peer review
    setPhase('review');
    const letters=['A','B','C','D','E'];
    const shuffled=[...ADVISORS].sort(()=>Math.random()-.5);
    const amap={};
    shuffled.forEach((a,i)=>{amap[letters[i]]=a.id;});
    results.amap=amap;
    const anonBlock=letters.map(l=>`**Response ${l}:**\n${results.advisors[amap[l]]}`).join('\n\n');
    const revRes=await Promise.all(ADVISORS.map(a=>
      callClaude(
        `You are ${a.name} reviewing an LLM Council. Be specific. Reference responses by letter. Under 150 words total. Answer all three questions.`,
        `Question:\n${framed}\n\nResponses:\n${anonBlock}\n\n1. Which response is strongest and why?\n2. Which has the biggest blind spot?\n3. What did ALL five miss?`
      ).then(t=>({id:a.id,t}))
    ));
    results.reviews={};
    revRes.forEach(r=>{results.reviews[r.id]=r.t;});
    setProgress(80,'Peer review done. Chairman synthesizing...');
    renderReviews(results.reviews,amap);

    // Chairman
    setPhase('chairman');
    const aBlock=ADVISORS.map(a=>`**${a.name}:**\n${results.advisors[a.id]}`).join('\n\n');
    const rBlock=ADVISORS.map(a=>`**${a.name} review:**\n${results.reviews[a.id]}`).join('\n\n');
    const raw=await callClaude(
      'You are the Chairman of an LLM Council. Synthesize into a final verdict. Be direct, no hedging. Output ONLY valid JSON with keys: agrees, clashes, blindspots, recommendation, oneAction. No markdown, no backticks, just the JSON object.',
      `Question:\n${framed}\n\nADVISOR RESPONSES:\n${aBlock}\n\nPEER REVIEWS:\n${rBlock}`
    );
    let v;
    try{v=JSON.parse(raw.replace(/```json|```/g,'').trim());}
    catch(e){v={agrees:raw,clashes:'',blindspots:'',recommendation:'',oneAction:''};}
    results.verdict=v;
    setProgress(100,'Council complete.');
    renderVerdict(v);

  }catch(err){
    document.getElementById('errorArea').innerHTML=`<div class="error-box">${esc(err.message)}</div>`;
  }finally{
    document.getElementById('runBtn').disabled=false;
    document.getElementById('spin').style.display='none';
  }
}

function clearAll(){
  document.getElementById('question').value='';
  document.getElementById('outputArea').innerHTML='';
  document.getElementById('errorArea').innerHTML='';
  document.getElementById('progressArea').style.display='none';
}

function renderFraming(f){
  document.getElementById('outputArea').innerHTML=`<div class="section">
    <div class="framing-card"><div class="framing-label">Framed question</div>${esc(f)}</div>
  </div>`;
}
function renderAdvisorSkeleton(){
  document.getElementById('outputArea').innerHTML+=`<div class="section" id="aSection">
    <div class="sec-title">5 Advisors</div>
    <div class="advisor-grid" id="aGrid">
      ${ADVISORS.map(a=>`<div class="a-card loading" id="ac-${a.id}">
        <div class="a-head"><span class="a-icon">${a.icon}</span><span class="a-name">${a.name}</span></div>
        <div class="a-body"><span class="spinner"></span> Analyzing...</div>
      </div>`).join('')}
    </div></div>`;
}
function renderAdvisors(advisors){
  ADVISORS.forEach(a=>{
    const c=document.getElementById('ac-'+a.id);
    if(c){c.classList.remove('loading');c.querySelector('.a-body').innerHTML=esc(advisors[a.id]);}
  });
}
function renderReviews(reviews,amap){
  const reveal=Object.entries(amap).map(([l,id])=>`${l} = ${ADVISORS.find(x=>x.id===id).name}`).join(' · ');
  document.getElementById('outputArea').innerHTML+=`<div class="section">
    <div class="sec-title">Peer Review</div>
    <div class="anon-note">Anonymization: ${reveal}</div>
    <div class="review-grid">
      ${ADVISORS.map((a,i)=>`<div class="r-card${i===4?' full':''}">
        <div class="r-from">Reviewed by ${a.name}</div>${esc(reviews[a.id])}
      </div>`).join('')}
    </div></div>`;
}
function renderVerdict(v){
  const s=(label,body)=>body?`<div class="v-sec"><div class="v-label">${label}</div><div class="v-body">${esc(body)}</div></div><hr class="v-hr">`:'';
  document.getElementById('outputArea').innerHTML+=`<div class="section">
    <div class="sec-title">Chairman Verdict</div>
    <div class="verdict-card">
      ${s('Where the council agrees',v.agrees)}
      ${s('Where the council clashes',v.clashes)}
      ${s('Blind spots caught',v.blindspots)}
      ${v.recommendation?`<div class="v-sec"><div class="v-label">The recommendation</div><div class="v-body">${esc(v.recommendation)}</div></div>`:''}
    </div>
    ${v.oneAction?`<div class="one-thing"><div class="v-label">The one thing to do first</div><div class="v-body">${esc(v.oneAction)}</div></div>`:''}
  </div>`;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
</script>
</body>
</html>
